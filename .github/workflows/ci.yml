name: CI - DevOps Monitoring Dashboard

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  PYTHON_VERSION: "3.11"

jobs:

  test:
    name: Lint & Tests (pytest + coverage)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: Run lint (flake8)
        run: |
          flake8 api dashboard tests

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --cov=api --cov-report=term --cov-fail-under=75


  build:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        run: |
          docker build -t devops-monitor-api:latest ./api

      - name: Build Dashboard image
        run: |
          docker build -t devops-monitor-dashboard:latest ./dashboard


  security:
    name: Security scan (Trivy)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build API image for scan
        run: docker build -t devops-monitor-api:scan ./api

      - name: Build Dashboard image for scan
        run: docker build -t devops-monitor-dashboard:scan ./dashboard

      - name: Run Trivy scan (API)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: devops-monitor-api:scan
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH

      - name: Run Trivy scan (Dashboard)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: devops-monitor-dashboard:scan
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH


  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [test, build, security]

    steps:
      - name: Success message
        run: |
          echo "CI completed successfully"
          echo "Lint done"
          echo "Tests done (coverage ≥ 75%)"
          echo "Docker build done"
          echo "Security scan done"